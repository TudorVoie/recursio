<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arrow Shade Animation</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #222;
  }

  .arrow {
    width: 0;
    height: 0;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
    border-left: 60px solid #3498db; /* Triangle arrow pointing right */
    position: relative;
    overflow: hidden;
  }

  /* The shading overlay */
  .arrow::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 60px;   /* same as arrow length */
    height: 30px;  /* same as arrow height */
    background: linear-gradient(to right, rgba(255,255,255,0.1), rgba(255,255,255,0.5), rgba(255,255,255,0.1));
    animation: shade 1s linear infinite;
  }

  @keyframes shade {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
</style>
</head>
<body>
  <div class="arrow"></div>
</body>
</html>
