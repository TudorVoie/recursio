<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade In with Shadow</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .box {
      width: 150px;
      height: 150px;
      background-color: #3498db;
      opacity: 0; /* start invisible */
      box-shadow: 0 0 0 rgba(0,0,0,0); /* no shadow initially */
      transform: scale(0.8); /* slightly smaller at start */
      transition: opacity 0.8s ease, box-shadow 0.8s ease, transform 0.8s ease;
      margin-bottom: 20px;
    }

    .box.show {
      opacity: 1; /* fade in */
      box-shadow: 0 15px 25px rgba(0,0,0,0.4); /* shadow appears */
      transform: scale(1); /* normal size */
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #3498db;
      color: white;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>

  <div class="box"></div>
  <button onclick="showBox()">Show Box</button>

  <script>
    function showBox() {
      const box = document.querySelector('.box');
      box.classList.add('show'); // triggers the fade-in + shadow animation
    }
  </script>

</body>
</html>
