<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Custom Scroll Matrix Viewer</title>
<style>
/* ===== Base Styles ===== */
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #222;
    font-family: sans-serif;
}

/* ===== Container for custom scroll ===== */
.custom_scroll_wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #333;
}

/* ===== Content area that scrolls ===== */
.viewport_area {
    position: absolute;
    top: 0;
    left: 0;
    width: 2000px;   /* large area to scroll */
    height: 1500px;  /* large area to scroll */
    background: #444;
}

/* ===== Matrix container ===== */
.container67 {
    position: relative;
    width: 100%;
    height: 100%;
}

/* ===== SVG layer ===== */
#svg-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 2000px;
    height: 1500px;
    pointer-events: none;
}

/* ===== Custom scrollbars ===== */
.scrollbar {
    position: absolute;
    background: rgba(200,200,200,0.2);
    border-radius: 5px;
}

.scrollbar.horizontal {
    bottom: 5px;
    left: 5px;
    right: 20px;
    height: 10px;
}

.scrollbar.vertical {
    top: 5px;
    right: 5px;
    bottom: 20px;
    width: 10px;
}

.thumb {
    background: rgba(255,255,255,0.7);
    border-radius: 5px;
    position: absolute;
    cursor: pointer;
}

.horizontal-thumb {
    height: 100%;
    width: 100px;
    left: 0;
}

.vertical-thumb {
    width: 100%;
    height: 100px;
    top: 0;
}

/* ===== Matrix cells (example) ===== */
.cell {
    width: 60px;
    height: 40px;
    background: #4d3ce7;
    border: 1px solid #fff;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-weight: bold;
    margin: 1px;
}

.whitecell {
    width: 60px;
    height: 40px;
    background: #aaa;
    border: 1px solid #fff;
    display: inline-flex;
    justify-content: center;
    align-items: center;
}
</style>
</head>
<body>

<div class="custom_scroll_wrapper">
    <div class="viewport_area">
        <div id="container" class="container67">
            <!-- Example cells -->
            <div style="display:flex; flex-wrap: wrap; width: 600px;">
                <div class="cell">1</div>
                <div class="cell">2</div>
                <div class="cell">3</div>
                <div class="cell">4</div>
                <div class="whitecell"></div>
                <div class="cell">5</div>
            </div>
        </div>
        <svg id="svg-lines"></svg>
    </div>
    <div class="scrollbar horizontal"><div class="thumb horizontal-thumb"></div></div>
    <div class="scrollbar vertical"><div class="thumb vertical-thumb"></div></div>
</div>

<script>
const wrapper = document.querySelector('.custom_scroll_wrapper');
const viewport = document.querySelector('.viewport_area');
const hThumb = document.querySelector('.horizontal-thumb');
const vThumb = document.querySelector('.vertical-thumb');

let isHDragging = false, isVDragging = false, startX, startY, startLeft, startTop;

function updateViewport() {
    const maxH = wrapper.clientWidth - hThumb.offsetWidth;
    const maxV = wrapper.clientHeight - vThumb.offsetHeight;

    const scrollX = (hThumb.offsetLeft / maxH) * (viewport.offsetWidth - wrapper.clientWidth);
    const scrollY = (vThumb.offsetTop / maxV) * (viewport.offsetHeight - wrapper.clientHeight);

    viewport.style.transform = `translate(${-scrollX}px, ${-scrollY}px)`;
}

// Horizontal dragging
hThumb.addEventListener('mousedown', e => { isHDragging=true; startX=e.clientX; startLeft=hThumb.offsetLeft; e.preventDefault(); });
document.addEventListener('mousemove', e => {
    if (!isHDragging) return;
    let newLeft = startLeft + (e.clientX - startX);
    newLeft = Math.max(0, Math.min(newLeft, wrapper.clientWidth - hThumb.offsetWidth));
    hThumb.style.left = newLeft + 'px';
    updateViewport();
});
document.addEventListener('mouseup', () => isHDragging=false);

// Vertical dragging
vThumb.addEventListener('mousedown', e => { isVDragging=true; startY=e.clientY; startTop=vThumb.offsetTop; e.preventDefault(); });
document.addEventListener('mousemove', e => {
    if (!isVDragging) return;
    let newTop = startTop + (e.clientY - startY);
    newTop = Math.max(0, Math.min(newTop, wrapper.clientHeight - vThumb.offsetHeight));
    vThumb.style.top = newTop + 'px';
    updateViewport();
});
document.addEventListener('mouseup', () => isVDragging=false);
</script>

</body>
</html>
