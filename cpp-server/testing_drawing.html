<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: "Lato", sans-serif;
  margin: 0;
}

/* Right-side sidenav */
.sidenav {
  height: 100%;
  width: 0;
  position: fixed;
  z-index: 1;
  top: 0;
  right: 0; 
  background-color: #111;
  overflow-x: hidden;
  transition: 0.5s;
  padding-top: 60px;
  text-align: center;
}

/* Menu links */
.sidenav a {
  padding: 8px 32px 8px 8px;
  text-decoration: none;
  font-size: 25px;
  color: #818181;
  display: block;
  transition: 0.3s;
}

.sidenav a:hover {
  color: #f1f1f1;
}

/* Hamburger icon */
.Right-side {
  font-size: 30px;
  cursor: pointer;
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 5;
  color: black; /* default color when closed */
  transition: color 0.3s;
}

/* Responsive adjustments */
@media screen and (max-height: 450px) {
  .sidenav {padding-top: 15px;}
  .sidenav a {font-size: 18px;}
}
</style>
</head>
<body>

<!-- Hamburger icon -->
<span id="hamburger" class="Right-side" onclick="toggleNav()">&#9776; Open</span>

<!-- Right sidenav -->
<div id="mySidenav" class="sidenav">
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Clients</a>
  <a href="#">Contact</a>
</div>

<script>
function toggleNav() {
  const nav = document.getElementById("mySidenav");
  const hamburger = document.getElementById("hamburger");
  
  if (nav.style.width === "15vw") {
    nav.style.width = "0";
    hamburger.style.color = "black"; // closed
  } else {
    nav.style.width = "15vw";
    hamburger.style.color = "white"; // opened
  }
}
</script>

</body>
</html>
